name: Build NexoGED Assinador

on:
  workflow_dispatch:
  push:
    paths:
      - "signer-desktop/**"
      - ".github/workflows/build-signer.yml"

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: win32
            artifact: NexoGED-Assinador-win32-x64
          - os: macos-latest
            platform: darwin
            artifact: NexoGED-Assinador-darwin-x64
          - os: ubuntu-latest
            platform: linux
            artifact: NexoGED-Assinador-linux-x64

    defaults:
      run:
        working-directory: signer-desktop

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: signer-desktop/package-lock.json

      - name: Setup Python 3.12 (node-gyp)
        if: matrix.platform == 'win32'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup MSVC (Windows native build for pkcs11js)
        if: matrix.platform == 'win32'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Install dependencies
        run: npm ci

      - name: Package (${{ matrix.platform }})
        run: npx @electron/packager . NexoGED-Assinador --platform=${{ matrix.platform }} --arch=x64 --out=dist --overwrite --asar --ignore=^/dist

      - name: Zip artifact (Windows)
        if: matrix.platform == 'win32'
        shell: pwsh
        run: |
          cd dist
          Compress-Archive -Path "${{ matrix.artifact }}" -DestinationPath "${{ matrix.artifact }}.zip" -Force

      - name: Zip artifact (macOS/Linux)
        if: matrix.platform != 'win32'
        run: |
          cd dist
          zip -r "${{ matrix.artifact }}.zip" "${{ matrix.artifact }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: signer-desktop/dist/${{ matrix.artifact }}.zip
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: signer-v${{ github.run_number }}
          name: NexoGED Assinador build ${{ github.run_number }}
          files: artifacts/*.zip
          generate_release_notes: false
